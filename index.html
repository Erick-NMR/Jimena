<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Jimena</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: "Century Gothic", sans-serif;
  height: 100vh;
  background: linear-gradient(to top, #FFF5A5, #E6CCFF);
  display: flex;
  justify-content: center;
  align-items: center;
}

/* BOTÓN */
#btn {
  background: #FFD700;
  color: black;
  font-weight: bold;
  font-size: 20px;
  padding: 15px 30px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  z-index: 10;
}

/* CONTENEDOR FLORES */
#flowers {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  overflow: hidden;
}

/* FLORES */
.flower {
  position: absolute;
  font-size: 30px;
  opacity: 1;
  transition: transform 3s linear, opacity 2s ease-out;
}

/* FINAL */
#final {
  position: absolute;
  text-align: center;
  opacity: 0;
  transition: opacity 2s ease;
}

#sunflowerBig {
  font-size: 120px;
}

#text {
  font-weight: bold;
  font-size: 28px;
  margin-top: 10px;
}

#otter {
  font-size: 60px;
  margin-top: 10px;
}
</style>
</head>

<body>

<button id="btn">Para Jimena</button>

<div id="flowers"></div>

<div id="final">
  <div id="sunflowerBig">🌻</div>
  <div id="text">Para la mejor nutrióloga</div>
  <div id="otter">🦦</div>
</div>

<script>
const btn = document.getElementById("btn");
const flowersContainer = document.getElementById("flowers");
const final = document.getElementById("final");

btn.addEventListener("click", () => {
  btn.style.display = "none";

  explodeFlowers();

  setTimeout(() => {
    fadeOutFlowers();
  }, 3000);

  setTimeout(() => {
    showFinal();
  }, 4500);
});

function explodeFlowers() {
  for (let i = 0; i < 120; i++) {
    const flower = document.createElement("div");
    flower.classList.add("flower");

    // Aleatorio entre girasol y margarita
    flower.innerHTML = Math.random() > 0.5 ? "🌻" : "🌼";

    flower.style.left = "50%";
    flower.style.top = "50%";

    flowersContainer.appendChild(flower);

    const angle = Math.random() * 2 * Math.PI;
    const distance = Math.random() * 600 + 200;

    const x = Math.cos(angle) * distance;
    const y = Math.sin(angle) * distance;

    setTimeout(() => {
      flower.style.transform = translate(${x}px, ${y}px);
    }, 10);
  }
}

function fadeOutFlowers() {
  const all = document.querySelectorAll(".flower");
  all.forEach(f => {
    f.style.opacity = "0";
  });
}

function showFinal() {
  flowersContainer.innerHTML = "";
  final.style.opacity = "1";
}
</script>

</body>
</html>
